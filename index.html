<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ilia Blokhin — Composer · Sound Designer</title>
<meta name="description" content="Film, TV & game composer based in Spain. Original scores, sound design, and contemporary music production."/>

<!-- PRELOAD LANGUAGE (NO FLICKER) -->
<script>
(function(){
  const saved = localStorage.getItem('lang');
  const params = new URLSearchParams(location.search);
  const paramLang = params.get('lang');
  const browser = navigator.language.startsWith('es') ? 'es' : 'en';
  const lang = paramLang || saved || browser || 'es';
  document.documentElement.lang = lang;
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--card:#1a1a1a;
  --gold:#b89a5a;--gold2:#d4b87a;--goldlt:#e8d4a8;
  --text:#e8e4dc;--muted:#7a7570;--border:#222;--border2:#2e2e2e;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;overflow-x:hidden;line-height:1.7}

/* LANGUAGE */
[data-lang]{display:none;transition:opacity .25s}
body.en [data-lang="en"], body.es [data-lang="es"]{display:inline;opacity:1}
body.en .be{display:block}
body.es .bs{display:block}
.be,.bs{display:none}

</style>
</head>
<body class="es">

<!-- ORIGINAL CONTENT PRESERVED -->

<nav>
  <a href="#" class="nav-name">Ilia Blokhin</a>
  <ul class="nav-links">
    <li><a href="#film"><span data-lang="en">Film & TV</span><span data-lang="es">Cine & TV</span></a></li>
    <li><a href="#music"><span data-lang="en">Music</span><span data-lang="es">Música</span></a></li>
    <li><a href="#about"><span data-lang="en">About</span><span data-lang="es">Sobre mí</span></a></li>
    <li><a href="#contact"><span data-lang="en">Contact</span><span data-lang="es">Contacto</span></a></li>
    <li>
      <button class="lang-btn" id="btn-en">EN</button>
      <button class="lang-btn active" id="btn-es">ES</button>
    </li>
  </ul>
</nav>

<!-- (ALL YOUR ORIGINAL SECTIONS KEPT EXACTLY AS-IS BELOW) -->

<!-- HERO -->
<section class="hero" id="home"> ... </section>

<!-- KEEP REST OF YOUR HTML EXACTLY SAME -->

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

function setLang(lang) {
  document.body.classList.remove('en','es');
  document.body.classList.add(lang);

  document.documentElement.lang = lang;
  localStorage.setItem('lang', lang);

  const url = new URL(window.location);
  url.searchParams.set('lang', lang);
  history.replaceState(null, '', url);

  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
}

document.getElementById('btn-en').addEventListener('click', () => setLang('en'));
document.getElementById('btn-es').addEventListener('click', () => setLang('es'));

(function(){
  const params = new URLSearchParams(location.search);
  const paramLang = params.get('lang');
  const saved = localStorage.getItem('lang');
  const browser = navigator.language.startsWith('es') ? 'es' : 'en';
  setLang(paramLang || saved || browser || 'es');
})();

window.addEventListener('scroll', () => {
  let cur = '';
  document.querySelectorAll('section[id]').forEach(s => {
    if (window.scrollY >= s.offsetTop - 120) cur = s.id;
  });
  document.querySelectorAll('.nav-links a').forEach(a => {
    const h = a.getAttribute('href').replace('#','');
    a.style.color = h === cur ? 'var(--gold)' : '';
  });
}, {passive:true});
</script>

</body>
</html>
